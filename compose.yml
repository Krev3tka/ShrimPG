services:
  app:
    build: .
    environment:
      - CONN_STR=postgres://shrimp_user:shrimp_password@db:5432/shrimp_db
      - SERVER_ADDRESS=0.0.0.0:8080
      - REDIS_ADDR=redis:6379
      - CRYPTO_SERVICE_ADDR=crypto:50051
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
          condition: service_healthy
      crypto:
        condition: service_started
    networks:
      - custom_net
  crypto:
    build:
      context: ./rust-crypto-service
    environment:
      - CRYPTO_SERVICE_ADDRESS=0.0.0.0:50051
    ports:
      - "50051:50051"
    networks:
      - custom_net
  db:
    image: postgres:16-alpine
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    network_mode: "host"
  redis:
    image: redis:7-alpine
    network_mode: "host"


networks:
  custom_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24